name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Allow runner IP on port 22
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "Runner IP: $RUNNER_IP"
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress \
            --region us-east-2 \
            --group-id sg-0fdee87e11e224206 \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32" \
            --tag-specifications "ResourceType=security-group-rule,Tags=[{Key=Name,Value=github-actions-temp}]"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build --platform linux/amd64 \
            -f apps/api/Dockerfile \
            -t 652892608187.dkr.ecr.us-east-2.amazonaws.com/hearloop-api:latest \
            .
          docker push 652892608187.dkr.ecr.us-east-2.amazonaws.com/hearloop-api:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: 18.223.189.193
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin \
              652892608187.dkr.ecr.us-east-2.amazonaws.com
            docker pull 652892608187.dkr.ecr.us-east-2.amazonaws.com/hearloop-api:latest
            docker stop hearloop-api || true
            docker rm hearloop-api || true
            docker run -d \
              --name hearloop-api \
              --env-file /home/ec2-user/.env \
              -p 3001:3001 \
              --restart unless-stopped \
              652892608187.dkr.ecr.us-east-2.amazonaws.com/hearloop-api:latest

      - name: Health check
        run: |
          echo "Waiting 15s for container to start..."
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
            http://18.223.189.193:3001/health \
            && echo "Health check passed" \
            || (echo "Health check FAILED" && exit 1)

      - name: Revoke runner IP from port 22
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --region us-east-2 \
            --group-id sg-0fdee87e11e224206 \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32" || true
